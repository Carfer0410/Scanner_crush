name: scanner_crush
description: "Escáner de Crush - ¿Quién te ama en secreto?"
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.2.0+1
  share_plus: ^7.2.1
  cupertino_icons: ^1.0.6
  audioplayers: ^5.0.0
  google_mobile_ads: ^5.1.0  # AdMob integration
  in_app_purchase: ^3.1.0   # In-App Purchases
  http: ^1.1.0              # Para SecureTimeService

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/sounds/

# Configuración para generar iconos de la app
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoapp.jpeg"
  min_sdk_android: 21 # Requerido para iconos adaptativos
  
  # Configuración para Android
  adaptive_icon_background: "#FF6F91" # Color primario de la app
  adaptive_icon_foreground: "assets/images/logoapp.jpeg"
  
  # Configuración específica para diferentes tamaños
  android_icon_background: "#FF6F91"
